<!-- Write a program to check if given number is prime or not -->
<!-- A prime number is a number greater than 1 that has exactly two factors — 1 and itself. -->
<script>
    var num = 8;

    if (num == 2 || num == 3) {
        document.write(`${num} is prime`);
    }
    else if (num % 2 == 0 && num % 3 == 0) {
        document.write(`${num} is prime`);
    }
    else {
        document.write(`${num} is non-prime`);
    }
</script>
