<html>
    <head>
        <title>HTML Frames</title>
    </head>
    <!---cols=For column View and rows=For Row View-->
        <frameset cols="30%,20%,20%">
            <frame name="left" src="First.html" />
            <frame name="center" src="Second.html" />
            <frame name="right" src="Video.html" />
            <noframes>
                <body>Your Browser Does not support frames.</body>
            </noframes>
        </frameset>
</html>
