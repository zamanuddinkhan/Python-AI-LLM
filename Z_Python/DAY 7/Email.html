<!-- This is FE: Form Level Validation -->
<html>
    <head>
        <title>Email Validation</title>
    </head>
    <body>
        <h2>Input an Email and Submit</h2>
        <form name="form1" action="#">
            <ul>
                <li><input type='text' name='t1'/</li>

                <li>&nbsp;</li>
                <li class="submit">
                    <input type="submit" name="submit" value="submit" onclick="ValidateEmail(document.form1.t1)"/>
                </li>
                <li>&nbsp;</li>
            </ul>
        </form>
        <script>
                function ValidateEmail(inputText)
                {
                    var mailfrmt = /^\w+@[a-zA-Z_]+?\.[a-zA-Z]{2,3}$/;
                    if(inputText.value.match(mailfrmt))
                    {
                        document.form.f1.focus();
                        return true;
                    }
                    else
                    {
                        alert("You have entered an invalid email address!");
                        document.form1.f1.focus();
                        return false;
                    }
                }
        </script>
    </body>
</html>
