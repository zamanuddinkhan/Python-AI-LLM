<html>
    <head>
        <title>Student Registration Form</title>
    </head>
    <body>
        <div style="text-align: center;">
        <h2>Student Registration Form</h2>
            <form action="#" method="get">
                <!--For input write INPUT tag -->
                <!--Placeholder is by default place of text and required is for mendatory input-->
                <label>Name:</label>
                <input type="text" name="sname" placeholder="Enter Name" required /><br><br>
                <label>Address:</label>
                <input type="text" name="sadd" placeholder="Enter Address" required /><br><br>
                <label>Date of Birth:</label>
                <input type="date" name="dob" /><br><br>
                <label>Email:</label>
                <input type="email" name="semail" placeholder="Enter Email ID" required /><br><br>
                <label>Username:</label>
                <input type="text" name="sunm" placeholder="Enter Username" required /><br><br>
                <label>Password:</label>
                <input type="password" name="spw" placeholder="Enter Password" required /><br><br>
                <input type="submit" value="Register" /><br><br>
        </form>
        </div>
    </body>
</html>
